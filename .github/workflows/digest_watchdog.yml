name: CRE Digest Watchdog

on:
  schedule:
    - cron: '30 13 * * *'   # 8:30 AM EST / 9:30 AM EDT — fires 90 min after main job
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watchdog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if digest already ran today
        id: check
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          if python3 -c "
import json, sys
try:
    data = json.load(open('data/seen_urls.json'))
    sys.exit(0 if '$TODAY' in data else 1)
except Exception:
    sys.exit(1)
"; then
            echo "ran=true" >> $GITHUB_OUTPUT
            echo "Digest already ran today ($TODAY) — nothing to do."
          else
            echo "ran=false" >> $GITHUB_OUTPUT
            echo "Digest has NOT run today ($TODAY) — running now."
          fi

      - name: Set up Python
        if: steps.check.outputs.ran == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check.outputs.ran == 'false'
        run: pip install -r requirements.txt

      - name: Fetch articles and send digest
        if: steps.check.outputs.ran == 'false'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python -m aggregator.main

      - name: Save seen URLs
        if: steps.check.outputs.ran == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_urls.json
          git diff --staged --quiet || git commit -m "chore: update seen URLs [skip ci]"
          git push
