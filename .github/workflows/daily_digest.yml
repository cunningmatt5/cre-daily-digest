name: CRE Daily Digest

on:
  # PRIMARY trigger: an external scheduler (cron-job.org) calls the
  # workflow_dispatch API at 6:30 AM America/New_York (DST-aware). See
  # SCHEDULING.md for setup. That path isn't subject to GitHub's schedule-queue
  # delays, so it delivers on time.
  #
  # FALLBACK: the cron entries below, in case the external trigger fails.
  # GitHub runs `schedule` in UTC only (no DST) and heavily deprioritizes
  # jobs at :00 of the hour, so we use odd, off-peak minutes and stagger
  # several early attempts. The skip-if-already-ran guard sends only the first.
  schedule:
    - cron: '22 10 * * *'   # ~6:22 AM EDT / 5:22 AM EST — first attempt
    - cron: '47 10 * * *'   # ~6:47 AM EDT / 5:47 AM EST
    - cron: '23 11 * * *'   # ~7:23 AM EDT / 6:23 AM EST
    - cron: '8 12 * * *'    # ~8:08 AM EDT / 7:08 AM EST — safety net
  workflow_dispatch:
    inputs:
      force:
        description: 'Send even if a digest already ran today'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if digest already ran today
        id: check
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "ran=false" >> $GITHUB_OUTPUT
            echo "Force run requested — proceeding regardless of today's history."
          elif grep -q "\"$TODAY\"" data/seen_urls.json 2>/dev/null; then
            echo "ran=true" >> $GITHUB_OUTPUT
            echo "Digest already ran today ($TODAY) — skipping."
          else
            echo "ran=false" >> $GITHUB_OUTPUT
            echo "Digest has not run today ($TODAY) — proceeding."
          fi

      - name: Set up Python
        if: steps.check.outputs.ran == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.check.outputs.ran == 'false'
        run: pip install -r requirements.txt

      - name: Fetch articles and send digest
        if: steps.check.outputs.ran == 'false'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m aggregator.main

      - name: Save seen URLs
        if: steps.check.outputs.ran == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_urls.json
          git diff --staged --quiet || git commit -m "chore: update seen URLs [skip ci]"
          git push
